<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my Baby, Vaness Marie Dela Calzada</title>
    <!-- External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@400;700&display=swap"
        rel="stylesheet">
    <!-- Modular Styles -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Modular Scripts -->
    <script src="js/script.js" defer></script>
</head>

<body>

    <!-- Animated Mesh Background -->
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Pulsing Heart Background -->
    <div class="heartbeat-backdrop"></div>

    <!-- Fireflies -->
    <div class="firefly" style="left: 10%; top: 80%; animation-delay: 0s;"></div>
    <div class="firefly" style="left: 80%; top: 20%; animation-delay: 2s;"></div>
    <div class="firefly" style="left: 40%; top: 50%; animation-delay: 4s;"></div>

    <!-- Falling Petals (Garden Drift) -->
    <div class="petal petal-green" style="left: 5%; animation-duration: 12s; animation-delay: 0s;"></div>
    <div class="petal petal-pink" style="left: 15%; animation-duration: 8s; animation-delay: 2s;"></div>
    <div class="petal petal-green" style="left: 25%; animation-duration: 15s; animation-delay: 1s;"></div>
    <div class="petal petal-pink" style="left: 35%; animation-duration: 10s; animation-delay: 4s;"></div>
    <div class="petal petal-green" style="left: 45%; animation-duration: 13s; animation-delay: 0s;"></div>
    <div class="petal petal-pink" style="left: 55%; animation-duration: 9s; animation-delay: 3s;"></div>
    <div class="petal petal-green" style="left: 65%; animation-duration: 11s; animation-delay: 5s;"></div>
    <div class="petal petal-pink" style="left: 75%; animation-duration: 14s; animation-delay: 2s;"></div>
    <div class="petal petal-green" style="left: 85%; animation-duration: 10s; animation-delay: 0s;"></div>
    <div class="petal petal-pink" style="left: 95%; animation-duration: 12s; animation-delay: 1s;"></div>
    <div class="petal petal-green" style="left: 10%; animation-duration: 14s; animation-delay: 6s;"></div>
    <div class="petal petal-pink" style="left: 30%; animation-duration: 11s; animation-delay: 7s;"></div>
    <div class="petal petal-green" style="left: 50%; animation-duration: 9s; animation-delay: 8s;"></div>
    <div class="petal petal-pink" style="left: 70%; animation-duration: 13s; animation-delay: 5s;"></div>
    <div class="petal petal-green" style="left: 90%; animation-duration: 10s; animation-delay: 9s;"></div>
    <div class="petal petal-green" style="left: 20%; animation-duration: 15s; animation-delay: 3s;"></div>
    <div class="petal petal-pink" style="left: 40%; animation-duration: 12s; animation-delay: 1s;"></div>
    <div class="petal petal-green" style="left: 60%; animation-duration: 14s; animation-delay: 4s;"></div>
    <div class="petal petal-pink" style="left: 80%; animation-duration: 11s; animation-delay: 0s;"></div>

    <!-- Realistic SVG Roses -->
    <div class="rose rose-bottom-left">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 130C60 130 40 100 40 70C40 40 70 20 100 20C130 20 160 40 160 70C160 100 140 130 100 130Z" fill="#1b4332" />
            <path d="M100 120C75 120 55 100 55 75C55 50 75 35 100 35C125 35 145 50 145 75C145 100 125 120 100 120Z" fill="#2d6a4f" />
            <path d="M100 110C85 110 70 95 70 75C70 55 85 45 100 45C115 45 130 55 130 75C130 95 115 110 100 110Z" fill="#40916c" />
            <path d="M100 100C90 100 82 92 82 80C82 68 90 60 100 60C110 60 118 68 118 80C118 92 110 100 100 100Z" fill="#52b788" />
            <path d="M100 85C95 85 92 82 92 78C92 74 95 70 100 70C105 70 108 74 108 78C108 82 105 85 100 85Z" fill="#95d5b2" />
        </svg>
    </div>

    <div class="rose rose-bottom-right">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 130C60 130 40 100 40 70C40 40 70 20 100 20C130 20 160 40 160 70C160 100 140 130 100 130Z" fill="#1b4332" />
            <path d="M100 120C75 120 55 100 55 75C55 50 75 35 100 35C125 35 145 50 145 75C145 100 125 120 100 120Z" fill="#2d6a4f" />
            <path d="M100 110C85 110 70 95 70 75C70 55 85 45 100 45C115 45 130 55 130 75C130 95 115 110 100 110Z" fill="#40916c" />
            <path d="M100 100C90 100 82 92 82 80C82 68 90 60 100 60C110 60 118 68 118 80C118 92 110 100 100 100Z" fill="#52b788" />
            <path d="M100 85C95 85 92 82 92 78C92 74 95 70 100 70C105 70 108 74 108 78C108 82 105 85 100 85Z" fill="#95d5b2" />
        </svg>
    </div>

    <!-- Nature Elements (Birds & Butterflies) -->
    <div class="bird bird-1">
        <svg viewBox="0 0 24 24" class="bird-svg">
            <path d="M1,5.5c0,0,3.3-1.5,5-1.5c1.7,0,5,1.5,5,1.5s3.3-1.5,5-1.5c1.7,0,5,1.5,5,1.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
    </div>
    <div class="bird bird-2">
        <svg viewBox="0 0 24 24" class="bird-svg">
            <path d="M1,5.5c0,0,3.3-1.5,5-1.5c1.7,0,5,1.5,5,1.5s3.3-1.5,5-1.5c1.7,0,5,1.5,5,1.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
    </div>

    <div class="butterfly b-1">
        <div class="wing wing-left"></div>
        <div class="wing wing-right"></div>
    </div>

    <!-- Main Content (Revealed after 3 seconds) -->
    <div class="card-container">
        <div class="card">
            <h1>For my Baby, <br> Vaness Marie Dela Calzada</h1>
            <p class="secret-message">
                "You are the green to my meadow, the life in my garden, <br>
                and the love that grows deeper with every second." <br>
                💚
            </p>
        </div>
    </div>

</body>

</html>
